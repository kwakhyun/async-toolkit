name: Release

# Publishes to npm when a version tag (e.g. v0.1.1) is pushed.
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
# One-time setup on npmjs.com is documented in CONTRIBUTING / README.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted Publishing requires npm >= 11.5.1
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # Fail early if the git tag doesn't match the version in package.json
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public --provenance
